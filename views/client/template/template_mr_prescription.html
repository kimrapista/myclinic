<div class="table-detail">
    <table>
        <thead>
            <tr>
                <th colspan="4" rowspan="2">
                    <label>Prescription</label>
                </th>
            </tr>
            <tr>
                <th class="action">

                    <md-menu>
                        <md-button class="md-primary md-mini" ng-click="$mdMenu.open($event)">
                            <md-icon class="material-icons">more_vert</md-icon>
                        </md-button>
                        <md-menu-content>
                            <md-menu-item>
                                <md-button ng-click="Report_View('PRESCRIPTION')" ng-disabled="Me().isAssistant || FORM.ID == 0">
                                    <md-icon class="material-icons">print</md-icon>
                                    <span>Preview prescription</span>
                                </md-button>
                            </md-menu-item>
                            <md-menu-item>
                                <md-button ng-disabled="FORM.READONLY" ng-click="Get_Lastest_Prescription($event)">
                                    <md-icon class="material-icons">filter_none</md-icon>
                                    <span>Copy previous prescription</span>
                                </md-button>
                            </md-menu-item>
                            <md-menu-item>
                                <md-button ng-click="Email_Prescription()" ng-disabled="FORM.ID == 0">
                                    <md-icon class="material-icons">email</md-icon>
                                    <span>Send to email</span>
                                </md-button>
                            </md-menu-item>
                        </md-menu-content>
                    </md-menu>
                </th>
            </tr>
            <tr>
                <th>Detail</th>
                <th style="width:90px;">Duration</th>
                <th style="width:70px;">Tabs</th>
                <th style="width:230px;">Instruction</th>
                <th class="action">
                    <md-button ng-click="Add_Prescription();"  ng-disabled="FORM.READONLY" class="md-primary ">
                        <md-tooltip md-direction="top">Add prescription</md-tooltip>
                        <md-icon class="material-icons">add</md-icon>
                    </md-button>
                </th>
            </tr>
        </thead>
        <tbody>
            <tr ng-repeat="(key,m) in FORM.MEDICINES">
                <td> 
                    <md-autocomplete md-input-name="test" md-no-cache="true" md-search-text="m.searchMeds" md-items="item in Medicines_Filter(m)" md-item-text="item.NAME" md-selected-item-change="Medicines_Selected(item,m)" md-clear-button="false"  md-min-length="0"  ng-disabled="m.CANCELLED || FORM.READONLY" required="!m.CANCELLED" md-mode="virtual" md-menu-class="autocomplete-virtual-template" md-menu-container-class="virtual-container">
                        <md-item-template>
                            <p ng-bind="item.NAME" class="item-desc"></p>
                        </md-item-template>
                        <md-not-found>
                            <span class="text-muted">Invalid medicine</span>
                        </md-not-found>
                        <div ng-messages="formParent.test.$error" role="alert" md-auto-hide="false">
                            <div ng-message="required">Required.</div>
                        </div>
                    </md-autocomplete>
                </td>
                <td>
                    <div style="width:90px;">
                        <md-autocomplete md-search-text="m.FREQUENCY" md-items="item in Durations() | filter: m.FREQUENCY" md-item-text="item.NAME" md-clear-button="false" md-min-length="0"  ng-disabled="m.CANCELLED || FORM.READONLY" >
                            <md-item-template>
                                <span ng-bind="item.NAME"></span>
                            </md-item-template>
                            <md-not-found>
                                <span class="text-muted">New data will be added.</span>
                            </md-not-found>
                        </md-autocomplete>
                    </div>
                </td>
                <td>
                    <md-input-container >
                        <input ng-model="m.QUANTITY" ng-disabled="m.CANCELLED || FORM.READONLY"  type="number" step="0.01" class="text-center" ng-required="!m.CANCELLED" aria-label="true">
                    </md-input-container>
                </td>
                <td>
                    <md-autocomplete md-search-text="m.INSTRUCTION" md-items="item in Instructions(m.INSTRUCTION)" md-item-text="item.NAME" md-min-length="0"  ng-disabled="m.CANCELLED || FORM.READONLY" md-mode="virtual" md-menu-class="autocomplete-virtual-template" md-menu-container-class="virtual-container">
                        <md-item-template>
                            <p ng-bind="item.NAME" class="item-desc"></p>
                        </md-item-template>
                        <md-not-found>
                            <span class="text-muted">New data will be added.</span>
                        </md-not-found>
                    </md-autocomplete>
                </td>
                <td class="action">
                    <md-button ng-click="Remove_Prescription(key);" ng-disabled="FORM.READONLY" class="md-warn ">
                        <md-icon ng-hide="m.CANCELLED" class="material-icons">remove</md-icon>
                        <md-icon ng-show="m.CANCELLED" class="material-icons">replay</md-icon>
                    </md-button>
                </td>
            </tr>
        </tbody>
    </table>  
</div>
