     

<div ng-show="FORM.ID > 0">

    <md-input-container class="md-block">
        <label>To:</label>
        <input ng-model = "FORM.REFERRALTO"  ng-disabled="FORM.READONLY"  >
    </md-input-container>

    <md-input-container class="md-block" >
        <label>Message</label>
        <textarea ng-model="FORM.REFERRALMSG" name="REFERRALMSG" ng-trim="false" md-maxlength="1000" ng-disabled="FORM.READONLY" ng-required="FORM.REFERRALTO" ></textarea>
        <div ng-messages="formParent.REFERRALMSG.$error" role="alert" md-auto-hide="false">
            <div ng-message="required">This is required.</div>
            <div ng-message="md-maxlength">character reach the max limit.</div>
        </div>
    </md-input-container>

    <md-button ng-click="FORM.REFERRALMSG = MyClinic().REFERRALDEFAULTTEXT;" ng-disabled="FORM.READONLY" class="md-mini md-primary">
        <md-tooltip md-direction="top">Default Referral message</md-tooltip>
        <md-icon class="material-icons">assignments</md-icon>
    </md-button>

    <md-button ng-click="Report_View('REFERRAL')" class="md-mini md-primary">
        <md-tooltip md-direction="top">Preview Referral letter</md-tooltip>
        <md-icon class="material-icons">print</md-icon>
    </md-button>

</div>

<div ng-show="FORM.ID == 0" class="text-muted">
    Please save first before editing referral letter.
</div>
