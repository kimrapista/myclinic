
<section ng-controller="Patients"  ng-init="Init();" >
	<md-progress-linear ng-hide="isLoaded" md-mode="indeterminate"></md-progress-linear>

	<div class="search-form">
		<form ng-submit="Submit_Search();">
			<div layout="row" layout-align="space-between center" class="container">
				<span flex="30" hide="" show-gt-sm=""></span>
				<span flex="30" hide="" show-gt-sm=""></span>
				<div flex="auto" layout="row">
					<input flex="auto" ng-model="search.name" ng-disabled="search.isSubmit" type="text" placeholder="Search Name or Mobile No.">
					<md-button class="md-primary md-mini" type="submit" ng-disabled="search.isSubmit">
						<md-icon ng-hide="search.isSubmit" class="material-icons">search</md-icon>
						<md-progress-circular  ng-show="search.isSubmit" md-mode="indeterminate" md-diameter="20" class="mx-auto"></md-progress-circular>
					</md-button>
				</div>
			</div>
		</form>
	</div>
	
	<md-button ng-show="isLoaded" href="#!/patient/new" class="md-fab md-primary bottom-right-fixed" >
		<md-icon class="material-icons">add</md-icon>
	</md-button>

	<div class="container" >

		<div class="table-responsive hover shadow">
			<table>
				<thead> 
					<tr>
						<th>Date Reg</th>
						<th>name</th>
						<th>Date of Birth</th>
						<th>Sex</th>
						<th>Mobile No.</th>
						<th class="action"></th>
					</tr>
				</thead>
				<tbody>
				<tr ng-repeat="(key, A) in Data()">
						<th>Date Reg</th>
						<td><span ng-bind="A.DATEREG|date:'MM/dd/y'"></span></td>
						<th>Name</th>
						<td><span ng-bind="A.LASTNAME+', '+A.FIRSTNAME+' '+ A.MIDDLENAME"></span></td>
						<th>Date of Birth</th>
						<td><span ng-bind="A.DOB|date:'MM/dd/y'"></span></td>
						<th>Sex</th>
						<td><span ng-bind="A.SEX"></span></td>
						<th>Mobile No.</th>
						<td><span ng-bind="A.MOBILENO"></span></td>
						<td class="action">
							<md-button ng-show="isLoaded" ng-href="#!/patient/{{A.ID}}/record" class="md-primary md-mini" >
								<md-tooltip md-direction="top">View Record</md-tooltip>
								<md-icon class="material-icons">arrow_forward</md-icon>
							</md-button>
						</td>		
					</tr> 
				</tbody>
			</table>
		</div>				


		<div ng-show="isLoaded && search.viewMore " class="text-center">
			<md-button ng-click="Submit_Search_More();" class="md-mini md-primary" ng-disabled="search.isSubmit">
				<md-tooltip md-direction="top">View more</md-tooltip>
				<md-icon ng-hide="search.isSubmit" class="material-icons">zoom_in</md-icon>
				<div ng-if="search.isSubmit" layout="row" layout-align="center">
					<md-progress-circular  md-mode="indeterminate" md-diameter="20"></md-progress-circular>
				</div>
			</md-button>
		</div>


	</div>



</section>
