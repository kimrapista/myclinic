
<section ng-controller="Users"  ng-init="Init();" >
	<md-progress-linear ng-hide="isLoaded" md-mode="indeterminate"></md-progress-linear>

	<md-button ng-show="isLoaded" ng-click="Add_Edit(0)" class="md-fab md-primary bottom-right-fixed " >
		<md-icon class="material-icons">add</md-icon>
	</md-button>
	

	<div class="container" >

		<md-card class="mt-5">
			<div class="table-unresponsive hover">
				<table>
					<thead>
						<tr>
							<th>Name</th>
							<th>Job Title</th>
							<th>user level</th>
							<th>Username</th>
							<th>ACTIVE</th>			
							<th></th>
						</tr>
					</thead>
					<tbody>
						<tr ng-repeat="A in Data() | orderBy: ['NAME']">
							<td ng-bind="A.NAME"></td>
							<td ng-bind="A.JOBTITLE"></td>
							<td ng-bind="A.POSITION"></td>
							<td ng-bind="A.USERNAME"></td>
							<td>
								<md-switch ng-model="A.ACTIVE" ng-change="User_Active(A);" aria-label="ACTIVE" class="my-0"></md-switch>
							</td>
							<td class="action">
								<md-menu ng-show="isLoaded" >
									<md-button class="md-primary md-mini" ng-click="$mdMenu.open($event)">
										<md-icon class="material-icons">more_vert</md-icon>
									</md-button>
									<md-menu-content>
										<md-menu-item>
											<md-button ng-click="Add_Edit(A.ID);" >
												<md-icon class="material-icons">edit</md-icon>
												Edit
											</md-button>
										</md-menu-item>
										<md-menu-item>
											<md-button ng-click="Reset_Password(A)">
												<md-icon class="material-icons">replay</md-icon>
												Reset Password
											</md-button>
										</md-menu-item>
									</md-menu-content>
								</md-menu>
							</td>					
						</tr> 
					</tbody>
				</table>
			</div>				
		</md-card>


	</div>
</section>
