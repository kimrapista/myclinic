<md-dialog aria-label="Advisory Form" ng-init="Init();" class="dialog-md">
	<md-toolbar>
		<div class="md-toolbar-tools"> 
			<h2 class="md-title">Advisory</h2>
		</div>
   </md-toolbar>
   
   <div ng-hide="isLoaded" class="loading-form">
		<div class="sk-folding-cube">
			<div class="sk-cube1 sk-cube"></div>
			<div class="sk-cube2 sk-cube"></div>
			<div class="sk-cube4 sk-cube"></div>
			<div class="sk-cube3 sk-cube"></div>
		</div>
   </div>
   
	<md-dialog-content class="md-padding" >

      <form  name="formParent" ng-submit="Submit_Form()" role="form">

         <md-input-container class="md-block">
				<input ng-model="FORM.TITLE" name="TITLE" type="text" placeholder="Title" required autofocus>
				<div ng-messages="formParent.TITLE.$error" role="alert" md-auto-hide="false">
					<div ng-message="required">This is required.</div>
				</div>
			</md-input-container>


			<md-input-container class="md-block">
				<label>Body</label>
				<textarea ng-model="FORM.BODY" name="BODY" md-maxlength="1000" ng-required="FORM.POST" ></textarea>
				<div ng-messages="formParent.BODY.$error" role="alert" md-auto-hide="false">
					<div ng-message="required">This is required.</div>
					<div ng-message="md-maxlength">character reach the max limit.</div>
				</div>
			</md-input-container>

         <div layout="row">
            <md-switch ng-model="FORM.POST" ng-change="Toggle_Post()" class="mr-3">POST</md-switch>

            <md-input-container>
               <input ng-model="FORM.POSTDATE" name="POSTDATE" placeholder="" type="date" ng-disabled="!FORM.POST">
               <div ng-messages="formParent.POSTDATE.$error" role="alert" md-auto-hide="false">
                  <div ng-message="required">This is required.</div>
               </div>
            </md-input-container>
         </div>


			<div layout="column" layout-gt-xs="row" layout-align="end" class="mt-3">
				<md-button ng-disabled="FORM.isSubmit || formParent.$invalid || !isLoaded"  type="submit" class="md-raised md-primary">
					<span ng-hide="FORM.isSubmit">Save</span>
					<md-progress-circular ng-show="FORM.isSubmit" md-mode="indeterminate" md-diameter="20" class="mx-auto"></md-progress-circular>
				</md-button>

				<md-button ng-click="Close();"  class="" >Cancel</md-button>
			</div>

		</form>
	</md-dialog-content>
</md-dialog>
