<md-dialog aria-label="Prescription Report" class="dialog-view-image">
	<md-toolbar>
		<div class="md-toolbar-tools">
			<h2 class="md-title">Prescription</h2>
			<span flex></span>
			<md-button class="md-icon-button" ng-click="Dialog_Close()">
				<md-icon class="material-icons" aria-label="Close dialog">close</md-icon>
			</md-button>
		</div>
	</md-toolbar>
	<md-dialog-content ng-cloak>
		<iframe ng-src="{{URL}}" scrolling="auto" ></iframe>
	</md-dialog-content>
</md-dialog>
