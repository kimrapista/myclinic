<md-dialog aria-label="PDF" class="modal-report">
	<md-toolbar>
		<div class="md-toolbar-tools">
			<h2 class="md-title" ng-bind="Title"></h2>
			<span flex></span>
			<md-button class="md-icon-button" ng-click="close()">
				<md-icon class="material-icons" aria-label="Close dialog">close</md-icon>
			</md-button>
		</div>
	</md-toolbar>
	<md-dialog-content > 

		<iframe ng-src="{{reportUrl}}" frameborder="0"></iframe>

	</md-dialog-content>

</md-dialog>
